paths:
  # ---- CSRF (wajib sebelum login) ----
  /sanctum/csrf-cookie:
    $ref: './paths/auth.yaml#/~1sanctum~1csrf-cookie'

  # ---- EPIC 1: Auth ----
  /auth/register:
    $ref: './paths/auth.yaml#/~1auth~1register'
  /auth/login:
    $ref: './paths/auth.yaml#/~1auth~1login'
  /auth/logout:
    $ref: './paths/auth.yaml#/~1auth~1logout'
  /auth/me:
    $ref: './paths/auth.yaml#/~1auth~1me'

  # ---- Patient Profile ----
  /patients/me:
    $ref: './paths/patients.yaml#/~1patients~1me'

  # ---- EPIC 2: Departments ----
  /departments:
    $ref: './paths/departments.yaml#/~1departments'
  /departments/{id}:
    $ref: './paths/departments.yaml#/~1departments~1{id}'

  # ---- EPIC 2: Doctors ----
  /doctors:
    $ref: './paths/doctors.yaml#/~1doctors'
  /doctors/{id}:
    $ref: './paths/doctors.yaml#/~1doctors~1{id}'

  # ---- EPIC 2: Nurses ----
  /nurses:
    $ref: './paths/nurses.yaml#/~1nurses'
  /nurses/{id}:
    $ref: './paths/nurses.yaml#/~1nurses~1{id}'

  # ---- EPIC 2: Schedule Templates (recurring) ----
  /doctors/{id}/schedule-templates:
    $ref: './paths/schedule_templates.yaml#/~1doctors~1{id}~1schedule-templates'
  /doctors/{id}/schedule-templates/{templateId}:
    $ref: './paths/schedule_templates.yaml#/~1doctors~1{id}~1schedule-templates~1{templateId}'

  # ---- EPIC 2/3: Schedule Instances (tanggal aktual) ----
  /schedule-instances:
    $ref: './paths/schedule_instances.yaml#/~1schedule-instances'
  /schedule-instances/{instanceId}:
    $ref: './paths/schedule_instances.yaml#/~1schedule-instances~1{instanceId}'

  # ---- EPIC 3: Reservations ----
  /reservations:
    $ref: './paths/reservations.yaml#/~1reservations'
  /reservations/{id}:
    $ref: './paths/reservations.yaml#/~1reservations~1{id}'
  /reservations/{id}/cancel:
    $ref: './paths/reservations.yaml#/~1reservations~1{id}~1cancel'

  # ---- EPIC 4: Queue ----
  /queues:
    $ref: './paths/queues.yaml#/~1queues'
  /queues/{id}/status:
    $ref: './paths/queues.yaml#/~1queues~1{id}~1status'

  # ---- EPIC 4: Reports ----
  /reports/queues:
    $ref: './paths/reports.yaml#/~1reports~1queues'
