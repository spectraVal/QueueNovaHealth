  - name: Departments
    description: "**EPIC 2** — CRUD departemen (Admin)"
  - name: Doctors
    description: "**EPIC 2** — CRUD dokter (Admin)"
  - name: Nurses
    description: "**EPIC 2** — CRUD suster (Admin)"
  - name: Schedule Templates
    description: "**EPIC 2** — Template jadwal berulang per dokter (Admin)"
  - name: Schedule Instances
