openapi: 3.0.3

# =============================================================================
# Hospital Queue Management System — API Contract v2.2 (SPA Cookie-Based)
# =============================================================================
# Stack      : Laravel 11 (API) + React SPA
# Auth       : Laravel Sanctum — SPA Cookie-Based (laravel_session + XSRF-TOKEN)
# Approach   : UI-First — disesuaikan dengan Figma design
# ERD        : v2 (schedule_templates + schedule_instances, field baru)
#
# PERUBAHAN UTAMA dari v2.1 (Bearer Token → SPA Cookie):
# -------------------------------------------------------
# 1. Tidak ada lagi Authorization: Bearer {token} di setiap request
# 2. Auth menggunakan dua mekanisme browser:
#    a. Cookie: laravel_session (session ID) + XSRF-TOKEN (enkripsi)
#    b. Header: X-XSRF-TOKEN (isi XSRF-TOKEN cookie yang sudah di-decrypt)
# 3. Endpoint baru wajib: GET /sanctum/csrf-cookie (sebelum apapun)
# 4. Cookie & header X-XSRF-TOKEN WAJIB diperbarui setelah hit:
#    - GET  /sanctum/csrf-cookie
#    - POST /auth/login
#    - POST /auth/logout
#    Selain ketiga endpoint di atas, FE cukup pakai nilai terkini.
# 5. Login response TIDAK lagi mengembalikan token — auth via cookie session
#
# ALUR INISIALISASI SPA
# ----------------------
# 1. GET  /sanctum/csrf-cookie
#    → Laravel set cookie: laravel_session + XSRF-TOKEN (encrypted)
#    → FE simpan kedua cookie, decrypt XSRF-TOKEN → taruh di header X-XSRF-TOKEN
# 2. POST /auth/login  (sertakan X-XSRF-TOKEN di header)
#    → Cookie laravel_session + XSRF-TOKEN diperbarui
#    → FE perbarui cookie + decrypt XSRF-TOKEN baru → update header X-XSRF-TOKEN
# 3. Semua request berikutnya: kirim cookie + header X-XSRF-TOKEN terkini
# 4. POST /auth/logout
#    → Cookie laravel_session + XSRF-TOKEN diperbarui
#    → FE perbarui cookie + reset X-XSRF-TOKEN
#
# ROLES
# -----
# patient | doctor | nurse | admin
#
# QUEUE STATE MACHINE
# -------------------
# booked → checked-in → waiting → called → in-progress → done
#                                                       ↘ no-show
#                                ↘ cancelled
# =============================================================================

info:
  title: Hospital Queue Management System API
  version: 2.2.0
  description: |
    REST API untuk sistem manajemen antrian rumah sakit QueueNova Health.
    Disesuaikan dengan UI Figma (UI-First approach).

    ### Perubahan dari v2.1
    - **Auth berubah**: dari Sanctum Bearer Token → **SPA Cookie-Based**
    - Tidak ada lagi `Authorization: Bearer {token}` di header
    - Wajib hit `GET /sanctum/csrf-cookie` sebelum login
    - Auth menggunakan `laravel_session` cookie + `X-XSRF-TOKEN` header

    ### Cara Kerja Cookie Auth
    ```
    1. GET /sanctum/csrf-cookie
       → Set cookie: laravel_session, XSRF-TOKEN (encrypted)
       → Decrypt XSRF-TOKEN → simpan sebagai X-XSRF-TOKEN header

    2. POST /auth/login
       → Cookie diperbarui (laravel_session + XSRF-TOKEN baru)
       → FE perbarui cookie + decrypt XSRF-TOKEN baru

    3. Semua request selanjutnya:
       → Kirim cookie otomatis (browser) + header X-XSRF-TOKEN terkini

    4. POST /auth/logout
       → Cookie diperbarui lagi
       → FE perbarui + bersihkan state
    ```

    ### Kapan FE Wajib Perbarui Cookie + X-XSRF-TOKEN
    | Endpoint | Perbarui? |
    |----------|-----------|
    | GET /sanctum/csrf-cookie | ✅ Ya |
    | POST /auth/login | ✅ Ya |
    | POST /auth/logout | ✅ Ya |
    | Endpoint lainnya | ❌ Tidak perlu |

servers:
  - url: http://localhost:8000/api
    description: Local Development Server
  - url: https://api.queuenova.example.com/api
    description: Production Server

components:
  securitySchemes:
    # [v2.2] SPA Cookie-Based Auth — menggantikan sanctumToken (Bearer)
    # Tidak ada lagi Authorization header.
    # Auth menggunakan:
    #   1. Cookie: laravel_session (otomatis dikirim browser)
    #   2. Header: X-XSRF-TOKEN (nilai XSRF-TOKEN cookie setelah di-decrypt)
    cookieAuth:
      type: apiKey
      in: cookie
      name: laravel_session
      description: |
        Laravel session cookie yang di-set otomatis oleh browser setelah
        GET /sanctum/csrf-cookie dan POST /auth/login.
        Dikirim otomatis oleh browser di setiap request ke domain yang sama.

    xsrfToken:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: |
        Nilai dari cookie XSRF-TOKEN yang sudah **di-decrypt** oleh FE.
        Wajib disertakan di setiap request yang mengubah state (POST, PATCH, DELETE).
        Juga diperlukan di GET /sanctum/csrf-cookie (sebelum ada nilainya, skip).

        **Kapan diperbarui:**
        - Setelah GET /sanctum/csrf-cookie → ambil XSRF-TOKEN cookie, decrypt, set ke header
        - Setelah POST /auth/login → ambil XSRF-TOKEN cookie baru, decrypt, update header
        - Setelah POST /auth/logout → ambil XSRF-TOKEN cookie baru, decrypt, update header

  schemas:
    # Auth
    RegisterRequest:           { $ref: './schemas/auth.yaml#/RegisterRequest' }
    LoginRequest:              { $ref: './schemas/auth.yaml#/LoginRequest' }
    LoginResponse:             { $ref: './schemas/auth.yaml#/LoginResponse' }
    UserResource:              { $ref: './schemas/auth.yaml#/UserResource' }

    # Patient profile
    PatientProfileResource:    { $ref: './schemas/patient.yaml#/PatientProfileResource' }
    PatientProfileRequest:     { $ref: './schemas/patient.yaml#/PatientProfileRequest' }

    # Department
    DepartmentResource:        { $ref: './schemas/department.yaml#/DepartmentResource' }
    DepartmentRequest:         { $ref: './schemas/department.yaml#/DepartmentRequest' }

    # Doctor
    DoctorResource:            { $ref: './schemas/doctor.yaml#/DoctorResource' }
    DoctorRequest:             { $ref: './schemas/doctor.yaml#/DoctorRequest' }
    DoctorUpdateRequest:       { $ref: './schemas/doctor.yaml#/DoctorUpdateRequest' }

    # Nurse
    NurseResource:             { $ref: './schemas/nurse.yaml#/NurseResource' }
    NurseRequest:              { $ref: './schemas/nurse.yaml#/NurseRequest' }
    NurseUpdateRequest:        { $ref: './schemas/nurse.yaml#/NurseUpdateRequest' }

    # Schedule Template (recurring)
    ScheduleTemplateResource:  { $ref: './schemas/schedule.yaml#/ScheduleTemplateResource' }
    ScheduleTemplateRequest:   { $ref: './schemas/schedule.yaml#/ScheduleTemplateRequest' }

    # Schedule Instance (tanggal aktual)
    ScheduleInstanceResource:  { $ref: './schemas/schedule.yaml#/ScheduleInstanceResource' }
    ScheduleInstanceRequest:   { $ref: './schemas/schedule.yaml#/ScheduleInstanceRequest' }

    # Reservation
    ReservationResource:       { $ref: './schemas/reservation.yaml#/ReservationResource' }
    ReservationRequest:        { $ref: './schemas/reservation.yaml#/ReservationRequest' }

    # Queue
    QueueResource:             { $ref: './schemas/queue.yaml#/QueueResource' }
    QueueStatusRequest:        { $ref: './schemas/queue.yaml#/QueueStatusRequest' }
    QueueReportResource:       { $ref: './schemas/queue.yaml#/QueueReportResource' }

    # Common
    SuccessResponse:           { $ref: './schemas/common.yaml#/SuccessResponse' }
    ErrorResponse:             { $ref: './schemas/common.yaml#/ErrorResponse' }
    ValidationErrorResponse:   { $ref: './schemas/common.yaml#/ValidationErrorResponse' }
    PaginationMeta:            { $ref: './schemas/common.yaml#/PaginationMeta' }

