# =============================================================================
# Paths — EPIC 4: Queue
# [v2.2] Auth: cookieAuth + X-XSRF-TOKEN header untuk PATCH
# =============================================================================

/queues:
  get:
    tags: [Queue]
    summary: Lihat daftar antrian (Nurse & Doctor)
    description: |
      **Nurse**: melihat semua antrian hari ini, terkelompok per schedule instance.
      **Doctor**: hanya antrian jadwal miliknya (filter by doctor_id dari session).
    operationId: getQueue
    security:
      - cookieAuth: []
    parameters:
      - name: date
        in: query
        description: "Filter by tanggal. Default: hari ini."
        required: false
        schema: { type: string, format: date, example: "2025-08-15" }
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [booked, checked-in, waiting, called, in-progress, done, no-show, cancelled]
      - name: instance_id
        in: query
        required: false
        schema: { type: integer, example: 1 }
    responses:
      '200':
        description: Daftar antrian
        content:
          application/json:
            example:
              data:
                - instance_id: 1
                  schedule_summary:
                    department_name: "Poli Umum"
                    start_time: "08:00"
                    end_time: "09:45"
                    total_antrian: 20
                    checked_in_count: 15
                  queue_items:
                    - queue_id: 1
                      queue_number: 1
                      status: "called"
                      estimated_wait_minutes: 0
                      nurse_notes: null
                      reservation:
                        reservation_id: 1
                        complaint: "Batuk dan pilek"
                        patient:
                          patient_id: 1
                          name: "Muhamad Rival Maulana"
                          gender: "laki-laki"
                          phone: "081234567890"
                        schedule:
                          instance_id: 1
                          date: "2025-08-15"
                          start_time: "08:00"
                          end_time: "09:45"
      '401':
        description: Session tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan Nurse atau Doctor
        content:
          application/json:
            example: { message: "Akses ditolak. Endpoint ini hanya untuk nurse dan doctor." }

/queues/{id}/status:
  parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer, example: 2 }

  patch:
    tags: [Queue]
    summary: Update status antrian (Nurse only)
    description: |
      **Nurse only**. Transisi valid:
      ```
      booked      → checked-in
      checked-in  → waiting
      waiting     → called      (trigger notif ke pasien)
      waiting     → no-show
      called      → in-progress
      in-progress → done
      booked/checked-in → cancelled
      ```
      Setelah update, sistem otomatis:
      1. Sync `reservations.status` via QueueObserver
      2. Recalculate estimasi antrian
      3. Kirim notifikasi ke pasien jika status = `called`
    operationId: updateQueueStatus
    security:
      - cookieAuth: []
    parameters:
      - $ref: '../schemas/common.yaml#/XSRFTokenHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/queue.yaml#/QueueStatusRequest' }
          example:
            status: "called"
            nurse_notes: "Pasien sudah siap, tekanan darah normal"
    responses:
      '200':
        description: Status diperbarui
        content:
          application/json:
            example:
              message: "Status antrian berhasil diperbarui."
              data:
                queue_id: 2
                queue_number: 2
                status: "called"
                estimated_wait_minutes: null
                nurse_notes: "Pasien sudah siap, tekanan darah normal"
                updated_at: "2025-08-15T10:05:00Z"
                reservation:
                  reservation_id: 2
                  complaint: "Demam"
                  patient:
                    patient_id: 2
                    name: "Handika Chandra Pratama"
                    gender: "laki-laki"
                    phone: "082345678901"
                  schedule:
                    instance_id: 1
                    date: "2025-08-15"
                    start_time: "08:00"
                    end_time: "09:45"
      '401':
        description: Session tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan Nurse
        content:
          application/json:
            example: { message: "Akses ditolak. Endpoint ini hanya untuk nurse." }
      '404':
        description: Antrian tidak ditemukan
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '409':
        description: Transisi status tidak valid
        content:
          application/json:
            example: { message: "Transisi status tidak valid. Status 'done' tidak dapat diubah lagi." }
      '419':
        description: CSRF token mismatch
        content:
          application/json:
            example: { message: "CSRF token mismatch." }
      '422':
        description: Nilai status tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ValidationErrorResponse' }
