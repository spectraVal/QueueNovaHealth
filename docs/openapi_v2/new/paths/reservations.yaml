# =============================================================================
# Paths — EPIC 3: Reservations
# [v2.2] Auth: cookieAuth + X-XSRF-TOKEN header untuk POST dan PATCH
# =============================================================================

/reservations:
  get:
    tags: [Booking]
    summary: Riwayat reservasi pasien
    description: "**Patient only**. Tab filter: Semua | Aktif | Selesai | Dibatalkan."
    operationId: getMyReservations
    security:
      - cookieAuth: []
    parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [active, completed, cancelled]
          example: "active"
      - name: page
        in: query
        required: false
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        required: false
        schema: { type: integer, default: 10 }
    responses:
      '200':
        description: Riwayat reservasi
        content:
          application/json:
            example:
              data:
                - reservation_id: 1
                  status: "active"
                  complaint: "Batuk dan pilek"
                  created_at: "2025-08-10T09:00:00Z"
                  doctor:
                    doctor_id: 1
                    name: "dr. Ucok Napitupulu, Sp.PD"
                    specialization: "Spesialis Penyakit Dalam"
                    department:
                      department_id: 1
                      name: "Poli Umum"
                  schedule:
                    instance_id: 1
                    date: "2025-08-18"
                    start_time: "16:00"
                    end_time: "18:00"
                    recommended_checkin_time: "15:45"
                  queue:
                    queue_id: 1
                    queue_number: 16
                    status: "booked"
                    estimated_wait_minutes: null
                    estimated_queue_number: 16
              meta:
                current_page: 1
                per_page: 10
                total: 3
                last_page: 1
                from: 1
                to: 3
      '401':
        description: Session tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan Patient
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }

  post:
    tags: [Booking]
    summary: Buat reservasi baru
    description: |
      **Patient only**. Sistem generate queue_number otomatis dengan status `booked`.
    operationId: createReservation
    security:
      - cookieAuth: []
    parameters:
      - $ref: '../schemas/common.yaml#/XSRFTokenHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/reservation.yaml#/ReservationRequest' }
          example:
            instance_id: 1
            complaint: "Batuk dan pilek sudah 3 hari, disertai demam ringan"
    responses:
      '201':
        description: Reservasi berhasil — nomor antrian digenerate
        content:
          application/json:
            example:
              message: "Reservasi berhasil dibuat."
              data:
                reservation_id: 5
                status: "active"
                complaint: "Batuk dan pilek sudah 3 hari, disertai demam ringan"
                created_at: "2025-08-10T09:30:00Z"
                doctor:
                  doctor_id: 1
                  name: "dr. Ucok Napitupulu, Sp.PD"
                  specialization: "Spesialis Penyakit Dalam"
                  department:
                    department_id: 1
                    name: "Poli Umum"
                schedule:
                  instance_id: 1
                  date: "2025-08-18"
                  start_time: "16:00"
                  end_time: "18:00"
                  recommended_checkin_time: "15:45"
                queue:
                  queue_id: 5
                  queue_number: 16
                  status: "booked"
                  estimated_wait_minutes: null
                  estimated_queue_number: 16
      '401':
        description: Session tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan Patient
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '409':
        description: Slot penuh atau double booking
        content:
          application/json:
            example:
              message: "Slot jadwal sudah penuh atau Anda sudah memiliki reservasi aktif pada jadwal ini."
      '419':
        description: CSRF token mismatch
        content:
          application/json:
            example: { message: "CSRF token mismatch." }
      '422':
        description: Validasi gagal
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ValidationErrorResponse' }

/reservations/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer, example: 1 }

  get:
    tags: [Booking]
    summary: Detail reservasi
    description: "**Patient only** — hanya reservasi milik pasien yang login."
    operationId: getReservationById
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Detail reservasi
        content:
          application/json:
            example:
              data:
                reservation_id: 1
                status: "active"
                complaint: "Batuk dan pilek sudah 3 hari"
                created_at: "2025-08-10T09:00:00Z"
                patient:
                  patient_id: 5
                  name: "Ucok Sitorus"
                  gender: "laki-laki"
                  bpjs_number: "0001234567890"
                  birth_place: "Medan"
                  birth_date: "1995-06-15"
                doctor:
                  doctor_id: 1
                  name: "dr. Ucok Napitupulu, Sp.PD"
                  specialization: "Spesialis Penyakit Dalam"
                  department:
                    department_id: 1
                    name: "Poli Umum"
                schedule:
                  instance_id: 1
                  date: "2025-08-18"
                  start_time: "16:00"
                  end_time: "18:00"
                  recommended_checkin_time: "15:45"
                queue:
                  queue_id: 1
                  queue_number: 16
                  status: "waiting"
                  estimated_wait_minutes: 25
                  estimated_queue_number: 16
      '401':
        description: Session tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan milik pasien ini
        content:
          application/json:
            example: { message: "Akses ditolak. Reservasi ini bukan milik Anda." }
      '404':
        description: Tidak ditemukan
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }

/reservations/{id}/cancel:
  parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer, example: 1 }

  patch:
    tags: [Booking]
    summary: Batalkan reservasi
    description: |
      **Patient only** — hanya reservasi milik pasien yang login.
      Tidak perlu request body.
      Gagal jika antrian sudah `called/in-progress/done`.
    operationId: cancelReservation
    security:
      - cookieAuth: []
    parameters:
      - $ref: '../schemas/common.yaml#/XSRFTokenHeader'
    responses:
      '200':
        description: Reservasi dibatalkan
        content:
          application/json:
            example:
              message: "Reservasi berhasil dibatalkan."
              data:
                reservation_id: 1
                status: "cancelled"
                queue:
                  queue_id: 1
                  queue_number: 16
                  status: "cancelled"
      '401':
        description: Session tidak valid
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan milik pasien ini
        content:
          application/json:
            example: { message: "Akses ditolak. Reservasi ini bukan milik Anda." }
      '409':
        description: Tidak bisa dibatalkan
        content:
          application/json:
            example: { message: "Reservasi tidak dapat dibatalkan karena pasien sudah dipanggil atau sedang konsultasi." }
      '419':
        description: CSRF token mismatch
        content:
          application/json:
            example: { message: "CSRF token mismatch." }
