# =============================================================================
# Paths — CSRF + EPIC 1: Authentication
# [v2.2] SPA Cookie-Based Auth — Bearer Token dihapus
#
# ALUR WAJIB FE:
# 1. GET  /sanctum/csrf-cookie          → dapatkan laravel_session + XSRF-TOKEN cookie
#                                          decrypt XSRF-TOKEN → set header X-XSRF-TOKEN
# 2. POST /auth/login                   → cookie diperbarui, perbarui X-XSRF-TOKEN
# 3. Semua request lain                 → kirim cookie + X-XSRF-TOKEN terkini
# 4. POST /auth/logout                  → cookie diperbarui, reset X-XSRF-TOKEN
#
# CATATAN PENTING:
# - Cookie laravel_session + XSRF-TOKEN dikirim OTOMATIS oleh browser
# - FE hanya perlu manually set header X-XSRF-TOKEN
#   (hasil decrypt dari cookie XSRF-TOKEN)
# - Cookie WAJIB diperbarui setelah: csrf-cookie, login, logout
# =============================================================================

# =============================================================================
# CSRF — Wajib hit sebelum login (atau saat SPA pertama load)
# BASE URL: http://localhost:8000 (bukan /api)
# =============================================================================
/sanctum/csrf-cookie:
  get:
    tags: [CSRF]
    summary: Inisialisasi CSRF cookie (wajib sebelum login)
    description: |
      **Wajib dipanggil pertama kali** sebelum melakukan login atau request apapun.
      Endpoint ini ada di root Laravel (`/sanctum/csrf-cookie`), bukan di `/api/`.

      **Yang terjadi setelah request ini:**
      - Laravel men-set dua cookie di browser:
        1. `laravel_session` — session ID (HTTP-only, tidak bisa dibaca JS)
        2. `XSRF-TOKEN` — CSRF token dalam bentuk **encrypted** (bisa dibaca JS)
      - FE wajib:
        1. Simpan kedua cookie (dilakukan otomatis oleh browser)
        2. **Decrypt** nilai `XSRF-TOKEN` cookie
        3. Set header `X-XSRF-TOKEN` = hasil decrypt tersebut

      **Kapan perlu dipanggil lagi:**
      - Saat SPA pertama kali load (sebelum ada session)
      - Jika session expired dan perlu re-init

      > ⚠️ Base URL endpoint ini adalah `http://localhost:8000/sanctum/csrf-cookie`
      > bukan `http://localhost:8000/api/sanctum/csrf-cookie`
    operationId: getCsrfCookie
    security: []
    parameters: []
    responses:
      '204':
        description: |
          Cookie berhasil di-set. Tidak ada response body.
          Browser otomatis menyimpan:
          - Cookie `laravel_session`
          - Cookie `XSRF-TOKEN` (encrypted)
        headers:
          Set-Cookie:
            description: |
              Dua cookie di-set sekaligus:
              1. `laravel_session=<session_id>; Path=/; HttpOnly; SameSite=Lax`
              2. `XSRF-TOKEN=<encrypted_token>; Path=/; SameSite=Lax`
            schema:
              type: string
              example: |
                laravel_session=eyJpdiI6...; Path=/; HttpOnly; SameSite=Lax
                XSRF-TOKEN=eyJpdiI6...encrypted...; Path=/; SameSite=Lax

# =============================================================================
# EPIC 1 — Authentication
# =============================================================================

/auth/register:
  post:
    tags: [Authentication]
    summary: Register pasien baru
    description: |
      Registrasi khusus **Pasien**. Doctor/Nurse/Admin didaftarkan oleh Admin.
      Dari Figma register screen: field Name, Email, Password, Password Confirmation.
      Data profil lengkap (BPJS, tempat lahir, dll) dilengkapi via `PATCH /patients/me`.

      **Prasyarat:** Pastikan sudah hit `GET /sanctum/csrf-cookie` terlebih dahulu
      agar cookie dan header `X-XSRF-TOKEN` sudah ter-set.
    operationId: registerPatient
    security: []
    parameters:
      - $ref: '../schemas/common.yaml#/XSRFTokenHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/RegisterRequest'
          example:
            name: "Ucok Sitorus"
            email: "ucok@example.com"
            password: "password123"
            password_confirmation: "password123"
            phone: "081234567890"
    responses:
      '201':
        description: Registrasi berhasil
        content:
          application/json:
            example:
              message: "Registrasi berhasil. Silakan login."
              data:
                user_id: 10
                email: "ucok@example.com"
                role: "patient"
                status: "active"
                profile:
                  patient_id: 5
                  name: "Ucok Sitorus"
                  phone: "081234567890"
                  bpjs_number: null
                  birth_place: null
                  birth_date: null
                  gender: null
      '419':
        description: |
          CSRF token mismatch — `X-XSRF-TOKEN` tidak valid atau tidak ada.
          FE perlu hit ulang `GET /sanctum/csrf-cookie` lalu coba lagi.
        content:
          application/json:
            example: { message: "CSRF token mismatch." }
      '422':
        description: Validasi gagal
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ValidationErrorResponse'
            example:
              message: "The given data was invalid."
              errors:
                email: ["The email has already been taken."]

/auth/login:
  post:
    tags: [Authentication]
    summary: Login — semua role (Patient, Doctor, Nurse, Admin)
    description: |
      Dari Figma login screen (admin & patient):
      - Field: Email, Password
      - Checkbox "Remember me" — implementasi di frontend (tidak di API)
      - Link "Forgot Password?" — belum dalam scope

      **[v2.2] Perubahan dari v2.1:**
      - Response **tidak lagi mengembalikan token**
      - Autentikasi dilanjutkan via cookie session yang di-set Laravel
      - Setelah login berhasil, FE **wajib memperbarui** cookie dan `X-XSRF-TOKEN`:
        1. Simpan cookie `laravel_session` baru (otomatis oleh browser)
        2. Simpan cookie `XSRF-TOKEN` baru (otomatis oleh browser)
        3. **Decrypt** `XSRF-TOKEN` cookie baru → update header `X-XSRF-TOKEN`

      **Prasyarat:** `GET /sanctum/csrf-cookie` sudah dipanggil sebelumnya.
    operationId: loginUser
    security: []
    parameters:
      - $ref: '../schemas/common.yaml#/XSRFTokenHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/LoginRequest'
          example:
            email: "ucok@example.com"
            password: "password123"
    responses:
      '200':
        description: |
          Login berhasil. Cookie `laravel_session` dan `XSRF-TOKEN` diperbarui.
          **FE wajib: decrypt XSRF-TOKEN cookie baru → update header X-XSRF-TOKEN.**
        headers:
          Set-Cookie:
            description: |
              Cookie diperbarui setelah login:
              1. `laravel_session` baru (session authenticated)
              2. `XSRF-TOKEN` baru (encrypted, perlu di-decrypt untuk X-XSRF-TOKEN)
            schema:
              type: string
              example: |
                laravel_session=<new_session_id>; Path=/; HttpOnly; SameSite=Lax
                XSRF-TOKEN=<new_encrypted_token>; Path=/; SameSite=Lax
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/LoginResponse'
            example:
              message: "Login berhasil."
              data:
                user:
                  user_id: 10
                  email: "ucok@example.com"
                  role: "patient"
                  status: "active"
                  profile:
                    patient_id: 5
                    name: "Ucok Sitorus"
                    phone: "081234567890"
                    bpjs_number: "0001234567890"
                    birth_place: "Medan"
                    birth_date: "1995-06-15"
                    gender: "laki-laki"
      '401':
        description: Email atau password salah
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
            example: { message: "Email atau password salah." }
      '419':
        description: |
          CSRF token mismatch — `X-XSRF-TOKEN` tidak valid.
          Hit ulang `GET /sanctum/csrf-cookie` lalu coba lagi.
        content:
          application/json:
            example: { message: "CSRF token mismatch." }
      '422':
        description: Validasi gagal
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ValidationErrorResponse' }

/auth/logout:
  post:
    tags: [Authentication]
    summary: Logout — invalidate session aktif
    description: |
      **[v2.2]** Session di server di-invalidate (bukan revoke token).
      Setelah logout berhasil, FE **wajib memperbarui** cookie dan `X-XSRF-TOKEN`:
      1. Cookie `laravel_session` lama tidak valid lagi
      2. Cookie `XSRF-TOKEN` baru di-set oleh Laravel
      3. **Decrypt** `XSRF-TOKEN` cookie baru → update header `X-XSRF-TOKEN`
      4. Bersihkan user state di React (redirect ke halaman login)

      Auth: cookie `laravel_session` dikirim otomatis oleh browser.
    operationId: logoutUser
    security:
      - cookieAuth: []
    parameters:
      - $ref: '../schemas/common.yaml#/XSRFTokenHeader'
    responses:
      '200':
        description: |
          Logout berhasil. Cookie `laravel_session` dan `XSRF-TOKEN` diperbarui.
          **FE wajib: decrypt XSRF-TOKEN cookie baru → update header X-XSRF-TOKEN.**
        headers:
          Set-Cookie:
            description: "Cookie diperbarui (session lama invalid, XSRF-TOKEN baru di-set)"
            schema:
              type: string
        content:
          application/json:
            example: { message: "Logout berhasil." }
      '401':
        description: Session tidak valid atau sudah expired
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
            example: { message: "Unauthenticated." }
      '419':
        description: CSRF token mismatch
        content:
          application/json:
            example: { message: "CSRF token mismatch." }

/auth/me:
  get:
    tags: [Authentication]
    summary: Ambil data user yang sedang login
    description: |
      Berguna untuk inisialisasi React SPA setelah refresh halaman.
      Jika session masih valid, mengembalikan data user + profile.
      Jika session expired → 401, FE redirect ke login.

      Auth: cookie `laravel_session` dikirim otomatis oleh browser.
      Header `X-XSRF-TOKEN` tidak diperlukan untuk GET request.
    operationId: getAuthenticatedUser
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Data user yang sedang login
        content:
          application/json:
            example:
              data:
                user_id: 10
                email: "ucok@example.com"
                role: "nurse"
                status: "active"
                profile:
                  nurse_id: 2
                  name: "Ucok Sihombing"
                  sip_number: "112345678"
                  gender: "laki-laki"
                  birth_date: "1990-07-10"
                  department:
                    department_id: 1
                    name: "Poli Umum"
      '401':
        description: Session tidak valid / belum login
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
            example: { message: "Unauthenticated." }
