# =============================================================================
# Schemas — Authentication
# [v2.2] SPA Cookie-Based — token dihapus dari LoginResponse
# =============================================================================

RegisterRequest:
  type: object
  required: [name, email, password, password_confirmation, phone]
  properties:
    name:
      type: string
      maxLength: 255
      example: "Ucok Sitorus"
    email:
      type: string
      format: email
      example: "ucok@example.com"
    password:
      type: string
      format: password
      minLength: 8
      example: "password123"
    password_confirmation:
      type: string
      format: password
      example: "password123"
    phone:
      type: string
      maxLength: 15
      example: "081234567890"

LoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
      example: "ucok@example.com"
    password:
      type: string
      format: password
      example: "password123"

# [v2.2] Response login — TIDAK lagi mengembalikan token.
# Auth dilanjutkan via cookie session (laravel_session + XSRF-TOKEN).
# Setelah login berhasil FE wajib:
#   1. Baca cookie XSRF-TOKEN yang baru di-set Laravel (encrypted)
#   2. Decrypt nilai tersebut
#   3. Set sebagai header X-XSRF-TOKEN untuk request berikutnya
LoginResponse:
  type: object
  properties:
    message:
      type: string
      example: "Login berhasil."
    data:
      type: object
      properties:
        # [v2.2] token field DIHAPUS — tidak ada lagi
        # Auth via cookie, bukan token
        user:
          $ref: '#/UserResource'

# Resource user — profile bervariasi per role:
# patient → { patient_id, name, phone, bpjs_number, birth_place, birth_date, gender }
# doctor  → { doctor_id, name, specialization, sip_number, gender, birth_date, doctor_status, department }
# nurse   → { nurse_id, name, sip_number, gender, birth_date, department }
# admin   → { admin_id, name }
UserResource:
  type: object
  properties:
    user_id:
      type: integer
      example: 10
    email:
      type: string
      format: email
      example: "ucok@example.com"
    role:
      type: string
      enum: [patient, doctor, nurse, admin]
      example: "patient"
    status:
      type: string
      enum: [active, inactive]
      example: "active"
    profile:
      type: object
      description: "Struktur berbeda per role. Lihat PatientProfileResource / DoctorResource / NurseResource."
      example:
        patient_id: 5
        name: "Ucok Sitorus"
        phone: "081234567890"
        bpjs_number: "0001234567890"
        birth_place: "Medan"
        birth_date: "1995-06-15"
        gender: "laki-laki"
