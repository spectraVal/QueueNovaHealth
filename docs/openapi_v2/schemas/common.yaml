# =============================================================================
# Schemas — Common / Shared
# =============================================================================

SuccessResponse:
  type: object
  properties:
    message:
      type: string
      example: "Operasi berhasil."

ErrorResponse:
  type: object
  properties:
    message:
      type: string
      example: "Terjadi kesalahan."

# Format default Laravel 422 validation error
ValidationErrorResponse:
  type: object
  properties:
    message:
      type: string
      example: "The given data was invalid."
    errors:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        email: ["The email has already been taken."]
        password: ["The password must be at least 8 characters."]

# Format Laravel Resource Pagination
PaginationMeta:
  type: object
  properties:
    current_page: { type: integer, example: 1 }
    per_page:     { type: integer, example: 10 }
    total:        { type: integer, example: 35 }
    last_page:    { type: integer, example: 4 }
    from:         { type: integer, example: 1 }
    to:           { type: integer, example: 10 }
