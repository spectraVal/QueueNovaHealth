# =============================================================================
# Paths — EPIC 2/3: Schedule Instances (Tanggal Aktual)
# [BARU v2.1]
#
# Dari Figma patien-view-detail-department:
# - Card jadwal: "dr. Gia Pratama", "POLI UMUM", "Selasa - --/--/2026",
#   "08:00", "Estimasi nomor antrian: 06", badge "Tersedia"/"Penuh"
# - Tombol "Pilih Jadwal" — mengarah ke Create Reservation
#
# Instances di-generate otomatis oleh Laravel Scheduler (2 minggu ke depan)
# Admin bisa override jam/kapasitas atau cancel instance tertentu
# =============================================================================

/schedule-instances:
  get:
    tags: [Schedule Instances]
    summary: Lihat jadwal aktual tersedia
    description: |
      Mengembalikan daftar schedule instances (tanggal aktual).
      Pasien menggunakan ini untuk melihat jadwal sebelum booking.
      Dari Figma: menampilkan dokter, poli, tanggal, jam, estimasi antrian, status slot.

      Filter wajib minimal salah satu: `department_id` atau `doctor_id` atau `date`.
      Default: hanya instances dengan `status = active` dan `date >= today`.
    operationId: getScheduleInstances
    security:
      - sanctumToken: []
    parameters:
      - name: department_id
        in: query
        required: false
        description: "Filter by departemen — alur booking patient dari poli ke jadwal"
        schema: { type: integer, example: 1 }
      - name: doctor_id
        in: query
        required: false
        description: "Filter by dokter tertentu"
        schema: { type: integer, example: 1 }
      - name: date
        in: query
        required: false
        description: "Filter by tanggal spesifik (YYYY-MM-DD)"
        schema: { type: string, format: date, example: "2025-08-18" }
      - name: from_date
        in: query
        required: false
        description: "Tanggal awal range. Default: hari ini."
        schema: { type: string, format: date, example: "2025-08-18" }
      - name: to_date
        in: query
        required: false
        description: "Tanggal akhir range. Default: 2 minggu dari sekarang."
        schema: { type: string, format: date, example: "2025-09-01" }
    responses:
      '200':
        description: Daftar jadwal aktual
        content:
          application/json:
            example:
              data:
                - instance_id: 1
                  template_id: 1
                  doctor_id: 1
                  doctor:
                    name: "dr. Ucok Napitupulu, Sp.PD"
                    specialization: "Spesialis Penyakit Dalam"
                    department:
                      department_id: 1
                      name: "Poli Umum"
                  date: "2025-08-18"
                  start_time: "08:00"
                  end_time: "12:00"
                  max_patients: 10
                  booked_slots: 5
                  available_slots: 5
                  # Dari Figma: "Estimasi nomor antrian: 06"
                  estimated_queue_number: 6
                  is_available: true
                  status: "active"
                  is_override: false
                  override_note: null
                - instance_id: 2
                  template_id: 1
                  doctor_id: 1
                  doctor:
                    name: "dr. Ucok Napitupulu, Sp.PD"
                    specialization: "Spesialis Penyakit Dalam"
                    department:
                      department_id: 1
                      name: "Poli Umum"
                  date: "2025-08-18"
                  start_time: "10:00"
                  end_time: "14:00"
                  max_patients: 10
                  booked_slots: 10
                  available_slots: 0
                  estimated_queue_number: 20
                  # Dari Figma: badge "Penuh"
                  is_available: false
                  status: "active"
                  is_override: false
                  override_note: null
      '401':
        description: Tidak terautentikasi
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }

/schedule-instances/{instanceId}:
  parameters:
    - name: instanceId
      in: path
      required: true
      schema: { type: integer, example: 1 }

  get:
    tags: [Schedule Instances]
    summary: Detail satu schedule instance
    operationId: getScheduleInstanceById
    security:
      - sanctumToken: []
    responses:
      '200':
        description: Detail instance
        content:
          application/json:
            example:
              data:
                instance_id: 1
                template_id: 1
                doctor_id: 1
                doctor:
                  name: "dr. Ucok Napitupulu, Sp.PD"
                  specialization: "Spesialis Penyakit Dalam"
                  department:
                    department_id: 1
                    name: "Poli Umum"
                date: "2025-08-18"
                start_time: "08:00"
                end_time: "12:00"
                max_patients: 10
                booked_slots: 5
                available_slots: 5
                estimated_queue_number: 6
                is_available: true
                status: "active"
                is_override: false
                override_note: null
      '404':
        description: Tidak ditemukan
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }

  patch:
    tags: [Schedule Instances]
    summary: Override atau cancel satu instance
    description: |
      **Admin only**. Override jam/kapasitas atau cancel instance tertentu.
      Jika `status = cancelled`:
        - Reservasi dengan status `booked` di instance ini akan dibatalkan otomatis
        - Notifikasi dikirim ke pasien terdampak
        - Reservasi yang sudah `checked-in/waiting/called/in-progress` → 409 Conflict
    operationId: updateScheduleInstance
    security:
      - sanctumToken: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/schedule.yaml#/ScheduleInstanceRequest' }
          example:
            start_time: "09:00"
            end_time: "13:00"
            override_note: "Jam diubah karena rapat koordinasi dokter"
    responses:
      '200':
        description: Instance diperbarui
        content:
          application/json:
            example:
              message: "Jadwal berhasil diperbarui."
              data:
                instance_id: 1
                date: "2025-08-18"
                start_time: "09:00"
                end_time: "13:00"
                max_patients: 10
                status: "active"
                is_override: true
                override_note: "Jam diubah karena rapat koordinasi dokter"
      '403':
        description: Bukan Admin
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '404':
        description: Instance tidak ditemukan
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '409':
        description: Ada pasien aktif (checked-in/waiting/called/in-progress)
        content:
          application/json:
            example:
              message: "Jadwal tidak dapat diubah karena ada pasien yang sedang aktif di klinik."
