# =============================================================================
# Paths — Patient Profile
# [BARU v2.1] Dari Figma form Create Reservation:
# Section "Informasi Pasien" menampilkan:
# Nama, No. BPJS, Tempat lahir, Tanggal lahir
# Data ini perlu ada di profil pasien sebelum booking.
# Pasien bisa lihat dan update profil sendiri.
# =============================================================================

/patients/me:
  get:
    tags: [Patient Profile]
    summary: Lihat profil pasien yang sedang login
    description: |
      Mengembalikan profil lengkap pasien yang sedang login.
      Data ini ditampilkan di section "Informasi Pasien" pada form Create Reservation Figma:
      Nama, No. BPJS, Tempat Lahir, Tanggal Lahir.
    operationId: getMyPatientProfile
    security:
      - sanctumToken: []
    responses:
      '200':
        description: Profil pasien
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '../schemas/patient.yaml#/PatientProfileResource'
            example:
              data:
                patient_id: 5
                name: "Ucok Sitorus"
                phone: "081234567890"
                bpjs_number: "0001234567890"
                birth_place: "Medan"
                birth_date: "1995-06-15"
                gender: "laki-laki"
                user_id: 10
      '401':
        description: Tidak terautentikasi
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan role patient
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
            example: { message: "Endpoint ini hanya untuk pasien." }

  patch:
    tags: [Patient Profile]
    summary: Update profil pasien sendiri
    description: |
      Pasien melengkapi data profil — BPJS, tempat lahir, tanggal lahir, gender.
      Data ini muncul di form Create Reservation (pre-filled dari profil).
      Partial update — kirim hanya field yang ingin diubah.
    operationId: updateMyPatientProfile
    security:
      - sanctumToken: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/patient.yaml#/PatientProfileRequest'
          example:
            bpjs_number: "0001234567890"
            birth_place: "Medan"
            birth_date: "1995-06-15"
            gender: "laki-laki"
    responses:
      '200':
        description: Profil berhasil diperbarui
        content:
          application/json:
            example:
              message: "Profil berhasil diperbarui."
              data:
                patient_id: 5
                name: "Ucok Sitorus"
                phone: "081234567890"
                bpjs_number: "0001234567890"
                birth_place: "Medan"
                birth_date: "1995-06-15"
                gender: "laki-laki"
                user_id: 10
      '401':
        description: Tidak terautentikasi
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '403':
        description: Bukan role patient
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '422':
        description: Validasi gagal
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ValidationErrorResponse' }
