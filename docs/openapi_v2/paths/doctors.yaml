# =============================================================================
# Paths — EPIC 2: Doctors
# Dari Figma admin-doctor-dashboard: list nama dokter + Delete/Edit/Info
# Dari Figma admin-doctor-form: Doctor Name, No SIP, Jenis Kelamin,
#   Tanggal Lahir, Spesialisasi, Department, Email, Password
# Dari Figma admin-doctor-detail: Info Dokter + tabel Schedule (Hari, Pukul, Aksi)
# =============================================================================

/doctors:
  get:
    tags: [Doctors]
    summary: Lihat daftar dokter
    operationId: getDoctors
    security:
      - sanctumToken: []
    parameters:
      - name: department_id
        in: query
        required: false
        schema: { type: integer, example: 1 }
      - name: search
        in: query
        required: false
        schema: { type: string, example: "dr. Ucok" }
    responses:
      '200':
        description: Daftar dokter
        content:
          application/json:
            example:
              data:
                - doctor_id: 1
                  name: "dr. Ucok Napitupulu, Sp.PD"
                  specialization: "Spesialis Penyakit Dalam"
                  sip_number: "112345678"
                  gender: "laki-laki"
                  birth_date: "1980-03-20"
                  doctor_status: "active"
                  department:
                    department_id: 1
                    name: "Poli Umum"
                  user_id: 5

  post:
    tags: [Doctors]
    summary: Daftarkan dokter baru
    description: |
      **Admin only**. Dari Figma form doctor:
      Doctor Name, No SIP, Jenis Kelamin, Tanggal Lahir, Spesialisasi, Department, Email, Password.
    operationId: createDoctor
    security:
      - sanctumToken: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/doctor.yaml#/DoctorRequest' }
          example:
            name: "dr. Ucok Napitupulu, Sp.PD"
            email: "ucok.dokter@hospital.com"
            password: "password123"
            specialization: "Spesialis Penyakit Dalam"
            department_id: 1
            sip_number: "112345678"
            birth_date: "1980-03-20"
            gender: "laki-laki"
    responses:
      '201':
        description: Dokter didaftarkan
        content:
          application/json:
            example:
              message: "Dokter berhasil didaftarkan."
              data:
                doctor_id: 1
                name: "dr. Ucok Napitupulu, Sp.PD"
                specialization: "Spesialis Penyakit Dalam"
                sip_number: "112345678"
                gender: "laki-laki"
                birth_date: "1980-03-20"
                doctor_status: "active"
                department:
                  department_id: 1
                  name: "Poli Umum"
                user_id: 5
      '403':
        description: Bukan Admin
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '422':
        description: Validasi gagal
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ValidationErrorResponse' }

/doctors/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer, example: 1 }

  get:
    tags: [Doctors]
    summary: Detail dokter + daftar template jadwal
    description: |
      Dari Figma admin-doctor-detail:
      - Section "Informasi Dokter": Nama, No SIP, Jenis Kelamin, Spesialisasi, Email, Department
      - Section "Schedule": tabel Hari + Jam + Aksi (Edit/Delete) + tombol "Add Schedule"
    operationId: getDoctorById
    security:
      - sanctumToken: []
    responses:
      '200':
        description: Detail dokter
        content:
          application/json:
            example:
              data:
                doctor_id: 1
                name: "dr. Ucok Napitupulu, Sp.PD"
                specialization: "Spesialis Penyakit Dalam"
                sip_number: "112345678"
                gender: "laki-laki"
                birth_date: "1980-03-20"
                doctor_status: "active"
                department:
                  department_id: 1
                  name: "Poli Umum"
                user_id: 5
                # Template jadwal ditampilkan di halaman detail dokter Figma
                schedule_templates:
                  - template_id: 1
                    day_of_week: "senin"
                    start_time: "09:00"
                    end_time: "15:00"
                    max_patients: 10
                    is_active: true
                  - template_id: 2
                    day_of_week: "selasa"
                    start_time: "09:00"
                    end_time: "15:00"
                    max_patients: 10
                    is_active: true
      '404':
        description: Tidak ditemukan
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }

  patch:
    tags: [Doctors]
    summary: Update data dokter
    description: "**Admin only** — partial update. Email/password tidak diubah di sini."
    operationId: updateDoctor
    security:
      - sanctumToken: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/doctor.yaml#/DoctorUpdateRequest' }
          example:
            specialization: "Spesialis Penyakit Dalam & Konsultan Ginjal"
            sip_number: "112345679"
    responses:
      '200':
        description: Data diperbarui
        content:
          application/json:
            example:
              message: "Data dokter berhasil diperbarui."
              data:
                doctor_id: 1
                name: "dr. Ucok Napitupulu, Sp.PD"
                specialization: "Spesialis Penyakit Dalam & Konsultan Ginjal"
                sip_number: "112345679"
                doctor_status: "active"
                department:
                  department_id: 1
                  name: "Poli Umum"
      '403':
        description: Bukan Admin
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }
      '404':
        description: Tidak ditemukan
        content:
          application/json:
            schema: { $ref: '../schemas/common.yaml#/ErrorResponse' }

  delete:
    tags: [Doctors]
    summary: Hapus dokter
    description: "**Admin only**. Hapus users + doctors. Gagal jika ada reservasi aktif."
    operationId: deleteDoctor
    security:
      - sanctumToken: []
    responses:
      '200':
        description: Dihapus
        content:
          application/json:
            example: { message: "Dokter berhasil dihapus." }
      '409':
        description: Masih ada reservasi aktif
        content:
          application/json:
            example: { message: "Dokter tidak dapat dihapus karena masih memiliki reservasi aktif." }
