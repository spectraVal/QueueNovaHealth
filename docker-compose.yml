name: queuenova

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - queuenova-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "9000"
    environment:
      APP_KEY: base64:xzE4oI69fFRsfLTse/G54qQ9gZllB2DSri5KFf2pXuk=
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: queuenova
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      SESSION_DOMAIN: localhost
    depends_on:
      db:
        condition: service_healthy
    networks:
      - queuenova-network

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./infrastructure/nginx/backend.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
    depends_on:
      - backend
    networks:
      - queuenova-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: queuenova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - queuenova-network

networks:
  queuenova-network:
    driver: bridge

volumes:
  postgres_data: